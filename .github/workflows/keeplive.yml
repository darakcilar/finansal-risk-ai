name: Keep Render Awake  
on: 
schedule:
  - cron: '*/10 * * * *' # Runs every 10 minutes
  workflow_dispatch:# Allows manual triggering of the workflow

jobs:
ping:
  runs-on: ubuntu-latest
  steps:
    - name: Ping the API Health Check Endpoint
      run: |
        curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/58.0.3029.110 Safari/537.3" -I https://your-api-endpoint.com/health